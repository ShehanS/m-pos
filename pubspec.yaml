name: flutter_bloc_app
description: Flutter app with BLoC, Firebase, FCM, Google Auth, i18n (Sinhala, English, Tamil)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # BLoC State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Firebase
  firebase_auth: ^5.3.1
  firebase_auth_platform_interface: ^7.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^13.0.0

  # UI & Animations
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Fonts & Icons
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Utilities
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  rxdart: ^0.27.7
  flutter_local_notifications: ^19.5.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  image_cropper: ^8.0.2
  font_awesome_flutter: ^10.9.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0
  flutter_gen_runner: ^5.4.0

flutter_gen:
  output: lib/gen/
#  synthetic-package: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/animations/

  fonts:
    - family: NotoSansSinhala
      fonts:
        - asset: assets/fonts/NotoSansSinhala-Regular.ttf
        - asset: assets/fonts/NotoSansSinhala-Bold.ttf
          weight: 700
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
